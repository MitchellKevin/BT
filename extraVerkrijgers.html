<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <title>Erfenisbelasting – Verkrijgers</title>
</head>

<body>
  <header>
    <img src="img/logo.png" alt="Logo" width="115" height="85" />
    <div class="headerMenu">
      <img src="account.png" alt="Account" width="30" height="30" />
      <img src="menu.png" alt="Menu" width="30" height="30" />
    </div>
  </header>

  <h2>Dit is een schoolproject</h2>

  <main>
    <form id="verkrijgersForm" action="summery.html" method="get" novalidate>
      <fieldset>
        <legend>Verkrijgers</legend>
        <div id="formsContainer">
          <fieldset class="verkrijger">
            <legend>Verkrijger 1</legend>

            <div class="q">BSN / RSIN <span aria-hidden="true">*</span></div>
            <input type="text" name="vk_bsn_1" maxlength="9" inputmode="numeric"
              pattern="[0-9]{9}" title="BSN moet uit 9 cijfers bestaan"
              required autocomplete="off" />
            <p class="veld-fout" id="error-vk-bsn-1" role="alert" hidden></p>

            <div class="q">Voorletter(s) <span aria-hidden="true">*</span></div>
            <input type="text" name="vk_voorletters_1" required
              pattern="[A-Za-z]+" autocomplete="off" />

            <div class="q">Tussenvoegsels</div>
            <input type="text" name="vk_tussenvoegsel_1" autocomplete="off" />

            <div class="q">Achternaam <span aria-hidden="true">*</span></div>
            <input type="text" name="vk_achternaam_1" required
              pattern="[A-Za-z]+" autocomplete="off" />

            <fieldset>
              <legend>Krijgt deze verkrijger het hele vermogen?</legend>
              <div class="radio-inputs">
                <label class="radio">
                  <input type="radio" name="vk_heleVermogen_1" value="nee" required>
                  <span class="name">Nee</span>
                </label>
                <label class="radio">
                  <input type="radio" name="vk_heleVermogen_1" value="ja">
                  <span class="name">Ja</span>
                </label>
              </div>
            </fieldset>

            <fieldset>
              <legend>Doet deze verkrijger een beroep op diens legitieme portie?</legend>
              <div class="radio-inputs">
                <label class="radio">
                  <input type="radio" name="vk_legitiemePortie_1" value="nee" required>
                  <span class="name">Nee</span>
                </label>
                <label class="radio">
                  <input type="radio" name="vk_legitiemePortie_1" value="ja">
                  <span class="name">Ja</span>
                </label>
              </div>
            </fieldset>
          </fieldset>
        </div>

        <div class="buttonSection">
          <button type="button" id="addFormBtn" hidden>+ Voeg verkrijger toe</button>
          <a href="index.html">← Terug</a>
          <button type="submit">Controleer gegevens →</button>
        </div>

      </fieldset>
    </form>
  </main>

  <script src="verkrijgers.js" defer></script>
</body>
</html>
